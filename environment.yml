name: epi_hd
channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # ── Core Python ────────────────────────────────────────────────────────────
  - python=3.11
  - pip

  # ── Scientific stack ───────────────────────────────────────────────────────
  - numpy>=1.26
  - scipy>=1.13
  - pandas>=2.2
  - matplotlib>=3.8
  - seaborn>=0.13
  - plotly>=5.24
  - scikit-learn>=1.5
  - statsmodels>=0.14
  - numba>=0.60
  - joblib>=1.4
  - patsy>=1.0

  # ── Bioinformatics tools ───────────────────────────────────────────────────
  - trimmomatic>=0.40

  # ── QC & trimming ────────────────────────────────────────────────────────
  - fastqc>=0.12
  - trim-galore>=0.6
  - cutadapt>=4.0
  - multiqc>=1.24

  # ── QC & trimming ────────────────────────────────────────────────────────
  - fastqc>=0.12
  - trim-galore>=0.6       # long RNA adapter trimming (wraps cutadapt)
  - cutadapt>=4.0          # small RNA adapter trimming (direct use)
  - multiqc>=1.24

  # ── Alignment ─────────────────────────────────────────────────────────
  - star>=2.7.10           # ADD: spliced aligner for mRNA/lncRNA (long RNA)
  - bowtie>=1.3            # ADD: short exact-match aligner for tsRNA/miRNA
  - bowtie2>=2.5           # keep: used for some short-read pipelines / bismark
  - hisat2>=2.2            # ADD: alternative spliced aligner (optional but useful)

  # ── Quantification ────────────────────────────────────────────────────
  - salmon>=1.10           # ADD: quasi-mapping quantification for mRNA/lncRNA
  - subread>=2.0           # ADD: featureCounts for count matrices

  # ── BAM/BED processing ────────────────────────────────────────────────
  - samtools>=1.20
  - bedtools>=2.31
  - htslib>=1.20
  - pysam>=0.22
  - deeptools>=3.5
  - macs3>=3.0

  # ── UCSC tools ────────────────────────────────────────────────────────
  - ucsc-bedgraphtobigwig
  - ucsc-genepredtobed
  - ucsc-gtftogenepred
  - ucsc-liftover

  # ── SRA download ──────────────────────────────────────────────────────
  - sra-tools>=3.0         # ADD: SRA dataset download and conversion

  # ── Compression / transfer ────────────────────────────────────────────
  - pigz>=2.6              # ADD: parallel gzip (needed for STAR index build)
  - wget                   # ADD: reference download
  - aria2                  # ADD: robust parallel download

  # ── Genomics Python ────────────────────────────────────────────────────────
  - biopython>=1.84
  - pybigwig>=0.3
  - py2bit>=0.3
  - pyfaidx>=0.8
  - pyvcf3>=1.0
  - bbmap>=39.0            # keep: useful for small RNA preprocessing

  # ── Single-cell / embedding ────────────────────────────────────────────────
  - scanpy>=1.10
  - anndata>=0.10
  - umap-learn>=0.5
  - pynndescent>=0.5
  - hmmlearn>=0.3

  # ── Data formats ──────────────────────────────────────────────────────────
  - h5py>=3.10
  - zarr>=2.18
  - numcodecs>=0.12
  - openpyxl>=3.1
  - polars-lts-cpu>=1.0

  # ── Workflow ───────────────────────────────────────────────────────────
  - snakemake-minimal=7.32.4   # pinned for reproducibility
  - pulp>=2.7
  - coin-or-cbc
  - perl

  # ── Jupyter ────────────────────────────────────────────────────────────────
  - ipykernel>=6.29
  - ipython>=8.0

  # ── Visualization extras ───────────────────────────────────────────────────
  - python-kaleido>=0.2

  # ── Utilities ──────────────────────────────────────────────────────────
  - gitpython>=3.1
  - tqdm>=4.66
  - rich>=13.0
  - click>=8.1
  - pyyaml>=6.0
  - requests>=2.31
  - networkx>=3.3
  - smart_open>=6.0
  - tabulate>=0.9
  - natsort>=8.4
  - threadpoolctl>=3.0
  - narwhals>=2.0

  # ── pip-only packages ──────────────────────────────────────────────────────
  - pip:
      - jupyterlab>=4.0
      - notebook>=7.0
      - jupyter>=1.1
      - ipywidgets>=8.0
      - jupyterlab-widgets>=3.0
      - widgetsnbextension>=4.0
